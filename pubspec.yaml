name: e_class
description: "Interactive app for learning sounds in spanish."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  audioplayers: ^5.2.1
  go_router: ^13.1.0
  provider: ^6.0.2
  shared_preferences: ^2.0.13

  cupertino_icons: ^1.0.6
  device_preview: ^1.1.0
  gif_view: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:

  uses-material-design: true

  assets:
    - assets/Audio/Syllables/
    - assets/Audio/SFX/greetings1.mp3
    - assets/Audio/SFX/lose1.mp3
    - assets/Audio/SFX/shift1.mp3
    - assets/Audio/SFX/win1.mp3
    - assets/Audio/SFX/win2.mp3
    - assets/Audio/SFX/win3.mp3
    - assets/Audio/SFX/win4.mp3
    - assets/Audio/Music/
    - assets/Images/Background/
    - assets/Images/UI/
    - assets/Images/Decoration/

  fonts:
    - family: Fifth Grader
      fonts:
        - asset: assets/Fifth-Grader.ttf
    - family: Ginthul
      fonts:
        - asset: assets/Ginthul.ttf
